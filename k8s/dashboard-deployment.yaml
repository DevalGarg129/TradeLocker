apiVersion: apps/v1
kind: Deployment

metadata:
  name: dashboard-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: dashboard

  template:
    metadata:
      labels:
        app: dashboard

    spec:
      containers:
        - name: dashboard
          image: devalgarg/tradelocker-dashboard:v1

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 80