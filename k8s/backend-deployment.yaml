apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: tradelocker-backend:v2

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 3000

        env:
        - name: MONGO_URL
          value: mongodb://mongo-service:27017/tradelocker

        - name: PORT
          value: "3000"